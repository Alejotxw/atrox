context:
  project: atrox
  description: AI-assisted automated pentesting framework
  stack:
    backend: Python 3.10+ / FastAPI (async) / pydantic-settings
    frontend: React 19 / Vite 8 / Tailwind CSS 4
  conventions:
    language: Spanish (user-facing strings and code comments)

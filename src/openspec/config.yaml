      unit: true
      integration: true  # requires Nmap installed, marker: @pytest.mark.integration
      e2e: false
    coverage:
      available: false
    quality:
      linter: false
      type_checker: false
      formatter: false
  frontend:
    runner: none  # no test runner configured
    quality:
      linter: true
      linter_command: "npm run lint"
      type_checker: false
      formatter: false

ci:
  file: .Github/workflows/backend-ci.yml
  runs: unit + integration tests on push/PR to main and HU-* branches

phases:
  proposal: required
  spec: required
  design: required
  tasks: required
  apply: required
  verify: required
  archive: optional
